name: Terraform Plan and Apply with Checkov

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TERRAFORM_VERSION: 1.5.0
  WORKING_DIR: ./terraform

jobs:
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Checkov Security Scan
        id: checkov
        run: |
          pip install checkov
          checkov -d ${{ env.WORKING_DIR }} \
            --framework terraform \
            --check CKV_AZURE_1,CKV_AZURE_2,CKV_AZURE_3,CKV_AZURE_4,CKV_AZURE_5,CKV_AZURE_6,CKV_AZURE_7,CKV_AZURE_8,CKV_AZURE_9,CKV_AZURE_10,CKV_AZURE_11,CKV_AZURE_12,CKV_AZURE_13,CKV_AZURE_14,CKV_AZURE_15,CKV_AZURE_16,CKV_AZURE_17,CKV_AZURE_18,CKV_AZURE_19,CKV_AZURE_20 \
            --output cli \
            --output junitxml=checkov-report.xml \
            || true
            
      - name: Parse Checkov Results
        run: |
          pip install lxml
          python << 'EOF'
          import xml.etree.ElementTree as ET
          import sys
          
          tree = ET.parse('checkov-report.xml')
          root = tree.getroot()
          
          high_severity_count = 0
          
          for testcase in root.findall('.//testcase'):
              failure = testcase.find('failure')
              if failure is not None:
                  message = failure.get('message', '')
                  if 'HIGH' in message or 'CRITICAL' in message:
                      high_severity_count += 1
                      print(f"HIGH/CRITICAL: {testcase.get('name')}")
                      print(f"   Details: {message[:200]}")
          
          if high_severity_count > 0:
              print(f"\nFound {high_severity_count} HIGH/CRITICAL severity issues!")
              sys.exit(1)
          else:
              print("\nNo HIGH/CRITICAL severity issues found!")
              sys.exit(0)
          EOF
        continue-on-error: true
        
      - name: Fail if High Severity Issues Found
        if: failure()
        run: |
          echo "Checkov found HIGH severity security issues!"
          echo "Please fix the issues before pushing to main branch."
          exit 1

  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: checkov
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
        
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        continue-on-error: true
        
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          
      - name: Terraform Apply (on main branch push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -no-color -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          
      - name: Export Terraform Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform output -json > outputs.json
          cat outputs.json
        working-directory: ${{ env.WORKING_DIR }}
        
      - name: Upload Outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ${{ env.WORKING_DIR }}/outputs.json
